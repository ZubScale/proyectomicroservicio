version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - usuarios
      - productos
      - pedidos

  usuarios:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn usuarios.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"

  productos:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn productos.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"

  pedidos:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn pedidos.main:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
